name: 'cmakefmt'
description: 'Install cmakefmt and optionally check CMake formatting'
author: 'cmakefmt'

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  version:
    description: >
      Version of cmakefmt to install (e.g. "0.2.0" or "latest").
      Omit or set to "latest" to install the newest release.
    required: false
    default: 'latest'

  mode:
    description: >
      High-level action mode. Supported values: check, diff, fix, setup.
      check verifies formatting, diff verifies and prints a unified diff,
      fix reformats in-place, and setup installs cmakefmt without running it.
      If omitted, the legacy check-only/diff/args inputs control behaviour.
    required: false
    default: ''

  scope:
    description: >
      File selection scope. Supported values: all, changed, staged.
      all checks the configured paths, changed checks files changed since
      the base ref, and staged checks staged Git-tracked files.
    required: false
    default: 'all'

  paths:
    description: >
      Newline-delimited paths to pass to cmakefmt. Use this instead of args
      when paths contain spaces or when checking multiple explicit roots.
      Cannot be combined with custom args or scope values other than all.
    required: false
    default: ''

  since:
    description: >
      Git base ref used by scope: changed. Ignored for other scopes. If
      omitted on pull_request events, defaults to the pull request base branch.
      If omitted on push events, defaults to the push event's before SHA.
    required: false
    default: ''

  args:
    description: >
      Advanced arguments to pass to cmakefmt after installation. Defaults
      to the entire repository. Prefer mode, scope, and paths for common
      workflows. Set to "" to install cmakefmt without running it.
    required: false
    default: '.'

  check-only:
    description: >
      Legacy input. When true (default), inject --check. When false, inject
      --in-place. Ignored when mode is set.
    required: false
    default: 'true'

  diff:
    description: >
      Legacy input. When true, print a unified diff of the changes cmakefmt
      would make. Prefer mode: diff. Ignored when mode is set.
    required: false
    default: 'false'

  report-format:
    description: >
      Output format for cmakefmt results. Injected as --report-format
      unless args already contains --report-format. Set to "" to disable.
      Supported values: human, github, json, checkstyle.
    required: false
    default: 'github'

  working-directory:
    description: >
      Directory from which to run cmakefmt. Defaults to the repository
      root. Useful for monorepo layouts where CMake files live under a
      subdirectory.
    required: false
    default: ''

  token:
    description: >
      GitHub token used to resolve "latest" and download release assets.
      Defaults to the built-in GITHUB_TOKEN. No extra permissions beyond
      the default read-only token are required.
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: 'The installed cmakefmt version (without leading v)'

runs:
  using: 'node20'
  main: 'dist/index.js'
