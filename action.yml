name: 'cmakefmt'
description: 'Install cmakefmt and optionally check CMake formatting'
author: 'cmakefmt'

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  version:
    description: >
      Version of cmakefmt to install (e.g. "0.2.0" or "latest").
      Omit or set to "latest" to install the newest release.
    required: false
    default: 'latest'

  args:
    description: >
      Arguments to pass to cmakefmt after installation. Defaults to
      check mode with GitHub annotations on the entire repository.
      Set to "" to install cmakefmt without running it.
      Note: paths containing spaces are not supported via this input —
      use args: "" and invoke cmakefmt directly in a subsequent run: step.
    required: false
    default: '--check --report-format github .'

  working-directory:
    description: >
      Directory from which to run cmakefmt. Defaults to the repository
      root. Useful for monorepo layouts where CMake files live under a
      subdirectory.
    required: false
    default: ''

  token:
    description: >
      GitHub token used to resolve "latest" and download release assets.
      Defaults to the built-in GITHUB_TOKEN. No extra permissions beyond
      the default read-only token are required.
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: 'The installed cmakefmt version (without leading v)'
    value: ${{ steps.resolve.outputs.version }}

runs:
  using: 'composite'
  steps:

    # ── Resolve "latest" to a concrete semver ──────────────────────────────
    - name: Resolve version
      id: resolve
      shell: bash
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        if [[ "${INPUT_VERSION}" == "latest" ]]; then
          VERSION="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/cmakefmt/cmakefmt/releases/latest" \
            | grep -oE '"tag_name": *"v?[0-9]+\.[0-9]+\.[0-9]+"' \
            | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
        else
          VERSION="${INPUT_VERSION#v}"
        fi
        echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
        echo "Resolved cmakefmt version: ${VERSION}"

    # ── Restore cached binary (Linux) ─────────────────────────────────────
    - name: Restore cached cmakefmt (Linux)
      if: runner.os == 'Linux'
      id: cache-linux
      uses: actions/cache@v5
      with:
        path: ~/.cmakefmt-bin
        key: cmakefmt-${{ runner.os }}-${{ runner.arch }}-${{ steps.resolve.outputs.version }}

    # ── Install on Linux ───────────────────────────────────────────────────
    - name: Install cmakefmt (Linux)
      if: runner.os == 'Linux' && steps.cache-linux.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64)  TARGET="x86_64-unknown-linux-musl" ;;
          aarch64) TARGET="aarch64-unknown-linux-gnu"  ;;
          *)
            echo "::error::Unsupported Linux architecture: ${ARCH}"
            exit 1
            ;;
        esac
        ARCHIVE="cmakefmt-${VERSION}-${TARGET}.tar.gz"
        BASE_URL="https://github.com/cmakefmt/cmakefmt/releases/download/v${VERSION}"
        INSTALL_DIR="${HOME}/.cmakefmt-bin"
        mkdir -p "${INSTALL_DIR}"
        echo "Downloading ${BASE_URL}/${ARCHIVE}"
        curl -fsSL "${BASE_URL}/${ARCHIVE}" -o "${RUNNER_TEMP}/${ARCHIVE}"
        echo "Verifying checksum"
        EXPECTED="$(curl -fsSL "${BASE_URL}/SHA256SUMS" | awk -v f="${ARCHIVE}" '$2 == f {print $1}')"
        ACTUAL="$(sha256sum "${RUNNER_TEMP}/${ARCHIVE}" | awk '{print $1}')"
        if [[ "${EXPECTED}" != "${ACTUAL}" ]]; then
          echo "::error::Checksum mismatch for ${ARCHIVE} (expected=${EXPECTED} actual=${ACTUAL})"
          exit 1
        fi
        tar -xz -C "${INSTALL_DIR}" --strip-components=1 \
            -f "${RUNNER_TEMP}/${ARCHIVE}" \
            "cmakefmt-${VERSION}-${TARGET}/cmakefmt"
        chmod +x "${INSTALL_DIR}/cmakefmt"

    # ── Add Linux binary to PATH ───────────────────────────────────────────
    - name: Add cmakefmt to PATH (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: echo "${HOME}/.cmakefmt-bin" >> "$GITHUB_PATH"

    # ── Restore cached binary (macOS) ─────────────────────────────────────
    - name: Restore cached cmakefmt (macOS)
      if: runner.os == 'macOS'
      id: cache-macos
      uses: actions/cache@v5
      with:
        path: ~/.cmakefmt-bin
        key: cmakefmt-${{ runner.os }}-${{ runner.arch }}-${{ steps.resolve.outputs.version }}

    # ── Install on macOS ───────────────────────────────────────────────────
    - name: Install cmakefmt (macOS)
      if: runner.os == 'macOS' && steps.cache-macos.outputs.cache-hit != 'true'
      shell: bash
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
        GH_TOKEN: ${{ inputs.token }}
      run: |
        set -euo pipefail
        ARCH="$(uname -m)"
        case "${ARCH}" in
          x86_64) TARGET="x86_64-apple-darwin"  ;;
          arm64)  TARGET="aarch64-apple-darwin"  ;;
          *)
            echo "::error::Unsupported macOS architecture: ${ARCH}"
            exit 1
            ;;
        esac
        ARCHIVE="cmakefmt-${VERSION}-${TARGET}.tar.gz"
        BASE_URL="https://github.com/cmakefmt/cmakefmt/releases/download/v${VERSION}"
        INSTALL_DIR="${HOME}/.cmakefmt-bin"
        mkdir -p "${INSTALL_DIR}"
        echo "Downloading ${BASE_URL}/${ARCHIVE}"
        curl -fsSL "${BASE_URL}/${ARCHIVE}" -o "${RUNNER_TEMP}/${ARCHIVE}"
        echo "Verifying checksum"
        EXPECTED="$(curl -fsSL "${BASE_URL}/SHA256SUMS" | awk -v f="${ARCHIVE}" '$2 == f {print $1}')"
        ACTUAL="$(shasum -a 256 "${RUNNER_TEMP}/${ARCHIVE}" | awk '{print $1}')"
        if [[ "${EXPECTED}" != "${ACTUAL}" ]]; then
          echo "::error::Checksum mismatch for ${ARCHIVE} (expected=${EXPECTED} actual=${ACTUAL})"
          exit 1
        fi
        tar -xz -C "${INSTALL_DIR}" --strip-components=1 \
            -f "${RUNNER_TEMP}/${ARCHIVE}" \
            "cmakefmt-${VERSION}-${TARGET}/cmakefmt"
        chmod +x "${INSTALL_DIR}/cmakefmt"

    # ── Add macOS binary to PATH ───────────────────────────────────────────
    - name: Add cmakefmt to PATH (macOS)
      if: runner.os == 'macOS'
      shell: bash
      run: echo "${HOME}/.cmakefmt-bin" >> "$GITHUB_PATH"

    # ── Restore cached binary (Windows) ───────────────────────────────────
    - name: Restore cached cmakefmt (Windows)
      if: runner.os == 'Windows'
      id: cache-windows
      uses: actions/cache@v5
      with:
        path: ~\.cmakefmt-bin
        key: cmakefmt-${{ runner.os }}-${{ runner.arch }}-${{ steps.resolve.outputs.version }}

    # ── Install on Windows ─────────────────────────────────────────────────
    - name: Install cmakefmt (Windows)
      if: runner.os == 'Windows' && steps.cache-windows.outputs.cache-hit != 'true'
      shell: pwsh
      env:
        VERSION: ${{ steps.resolve.outputs.version }}
      run: |
        $Version     = $env:VERSION
        $Target      = "x86_64-pc-windows-msvc"
        $Archive     = "cmakefmt-${Version}-${Target}.zip"
        $BaseUrl     = "https://github.com/cmakefmt/cmakefmt/releases/download/v${Version}"
        $OutZip      = Join-Path $env:RUNNER_TEMP $Archive
        $InstDir     = Join-Path $env:USERPROFILE ".cmakefmt-bin"
        Write-Host "Downloading ${BaseUrl}/${Archive}"
        Invoke-WebRequest -Uri "${BaseUrl}/${Archive}" -OutFile $OutZip -UseBasicParsing
        Write-Host "Verifying checksum"
        $Checksums = (Invoke-WebRequest -Uri "${BaseUrl}/SHA256SUMS" -UseBasicParsing).Content
        $Expected  = ($Checksums -split "`n" |
                      Where-Object { ($_ -split '\s+')[1] -eq $Archive }) -replace '\s.*', ''
        $Actual    = (Get-FileHash -Path $OutZip -Algorithm SHA256).Hash.ToLower()
        if ($Actual -ne $Expected.ToLower()) {
          Write-Host "::error::Checksum mismatch for ${Archive} (expected=${Expected} actual=${Actual})"
          exit 1
        }
        New-Item -ItemType Directory -Path $InstDir -Force | Out-Null
        Expand-Archive -Path $OutZip -DestinationPath $env:RUNNER_TEMP -Force
        $SrcDir = Join-Path $env:RUNNER_TEMP "cmakefmt-${Version}-${Target}"
        Copy-Item -Path (Join-Path $SrcDir "cmakefmt.exe") -Destination $InstDir

    # ── Add Windows binary to PATH ─────────────────────────────────────────
    - name: Add cmakefmt to PATH (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $InstDir = Join-Path $env:USERPROFILE ".cmakefmt-bin"
        $InstDir | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

    # ── Optionally run cmakefmt ────────────────────────────────────────────
    - name: Run cmakefmt
      if: inputs.args != ''
      working-directory: ${{ inputs.working-directory || github.workspace }}
      shell: bash
      env:
        CMAKEFMT_ARGS: ${{ inputs.args }}
      run: |
        # CMAKEFMT_ARGS is intentionally word-split so users can pass multiple
        # flags (e.g. "--check --report-format github ."). Paths containing
        # spaces are not supported — use args: "" and call cmakefmt directly.
        # shellcheck disable=SC2086
        cmakefmt $CMAKEFMT_ARGS
