name: 'cmakefmt'
description: 'Install cmakefmt and optionally check CMake formatting'
author: 'cmakefmt'

branding:
  icon: 'check-square'
  color: 'blue'

inputs:
  version:
    description: >
      Version of cmakefmt to install (e.g. "0.2.0" or "latest").
      Omit or set to "latest" to install the newest release.
    required: false
    default: 'latest'

  args:
    description: >
      Arguments to pass to cmakefmt after installation. Defaults to
      the entire repository. Flags like --check and --report-format are
      injected automatically from their dedicated inputs.
      Set to "" to install cmakefmt without running it.
    required: false
    default: '.'

  check-only:
    description: >
      When true (default), only check whether files would be reformatted
      and exit non-zero if any would change. When false, reformat files
      in-place. Skipped if args already contains --check or --in-place.
    required: false
    default: 'true'

  diff:
    description: >
      When true, print a unified diff of the changes cmakefmt would make.
      Injected as --diff. Skipped if args already contains --diff.
    required: false
    default: 'false'

  report-format:
    description: >
      Output format for cmakefmt results. Injected as --report-format
      unless args already contains --report-format. Set to "" to disable.
      Supported values: human, github, json, checkstyle.
    required: false
    default: 'github'

  working-directory:
    description: >
      Directory from which to run cmakefmt. Defaults to the repository
      root. Useful for monorepo layouts where CMake files live under a
      subdirectory.
    required: false
    default: ''

  token:
    description: >
      GitHub token used to resolve "latest" and download release assets.
      Defaults to the built-in GITHUB_TOKEN. No extra permissions beyond
      the default read-only token are required.
    required: false
    default: ${{ github.token }}

outputs:
  version:
    description: 'The installed cmakefmt version (without leading v)'

runs:
  using: 'node20'
  main: 'dist/index.js'
