name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions: read-all

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Build: verify dist/ is up to date ────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - uses: actions/setup-node@v6
        with:
          node-version: 20

      - run: npm ci

      - run: npm test

      - run: npm run build

      - name: Check dist/ is up to date
        run: |
          if [[ -n "$(git status --porcelain dist/)" ]]; then
            echo "::error::dist/ is out of date — run 'npm run build' and commit"
            git diff --stat dist/
            exit 1
          fi

  # ── Test: default invocation (latest version, check mode) ───────────────
  test-default:
    name: default (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Write a well-formatted CMake file
        shell: bash
        run: |
          mkdir -p test
          cat > test/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.25)
          project(hello)
          add_executable(hello main.cpp)
          EOF

      - name: Install and run via action (default args)
        uses: ./
        with:
          args: 'test/CMakeLists.txt'

      - name: Verify cmakefmt is on PATH after action completes
        shell: bash
        run: cmakefmt --version

  # ── Test: install only (args = "") ──────────────────────────────────────
  test-install-only:
    name: install-only
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cmakefmt without running it
        id: setup
        uses: ./
        with:
          args: ''

      - name: Check output version is set
        shell: bash
        run: |
          echo "Installed version: ${{ steps.setup.outputs.version }}"
          [[ -n "${{ steps.setup.outputs.version }}" ]]

      - name: Run manually
        shell: bash
        run: cmakefmt --version

  # ── Test: action metadata loads and setup mode works ────────────────────
  test-setup-mode:
    name: setup-mode
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cmakefmt via setup mode
        uses: ./
        with:
          mode: setup

      - name: Verify cmakefmt is on PATH
        shell: bash
        run: cmakefmt --version

  # ── Test: pinned version ─────────────────────────────────────────────────
  test-pinned-version:
    name: pinned-version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install pinned version
        id: setup
        uses: ./
        with:
          version: '0.2.0'
          args: ''

      - name: Verify installed version matches pin
        shell: bash
        run: |
          INSTALLED="$(cmakefmt --version | grep -oE '[0-9]+\.[0-9]+\.[0-9]+')"
          echo "Installed: ${INSTALLED}"
          [[ "${INSTALLED}" == "0.2.0" ]]

      - name: Verify version output matches pin
        shell: bash
        run: |
          echo "Output version: ${{ steps.setup.outputs.version }}"
          [[ "${{ steps.setup.outputs.version }}" == "0.2.0" ]]

  # ── Test: --check correctly fails on unformatted files ──────────────────
  test-check-fails:
    name: check-fails-on-unformatted
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Install cmakefmt
        uses: ./
        with:
          args: ''

      - name: Write an intentionally unformatted CMake file
        shell: bash
        run: |
          printf 'cmake_minimum_required(VERSION 3.25)\nproject(   hello   )\n' \
            > unformatted.cmake

      - name: Run check mode (expected to fail)
        id: check
        uses: ./
        with:
          args: 'unformatted.cmake'
        continue-on-error: true

      - name: Assert that check correctly reported failure
        shell: bash
        run: |
          if [[ "${{ steps.check.outcome }}" != "failure" ]]; then
            echo "::error::Expected --check to exit non-zero on an unformatted file, but it succeeded"
            exit 1
          fi
          echo "OK: --check correctly failed on an unformatted file"

  # ── Test: working-directory input ───────────────────────────────────────
  test-working-directory:
    name: working-directory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Write a well-formatted CMake file in a subdirectory
        shell: bash
        run: |
          mkdir -p sub/cmake
          cat > sub/cmake/CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.25)
          project(sub)
          EOF

      - name: Run action scoped to subdirectory
        uses: ./
        with:
          args: 'cmake'
          working-directory: sub

  # ── Test: changed-file scope with a real local Git range ────────────────
  test-changed-scope:
    name: changed-scope
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Create nested Git fixture
        shell: bash
        run: |
          set -euo pipefail
          mkdir changed-scope-smoke
          cd changed-scope-smoke
          git init -b main
          git config user.name "cmakefmt CI"
          git config user.email "ci@cmakefmt.dev"
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.25)
          project(before)
          EOF
          git add CMakeLists.txt
          git commit -m "Initial CMake file"
          cat > CMakeLists.txt <<'EOF'
          cmake_minimum_required(VERSION 3.25)
          project(after)
          EOF
          git add CMakeLists.txt
          git commit -m "Update CMake file"

      - name: Check changed CMake files
        uses: ./
        with:
          working-directory: changed-scope-smoke
          scope: changed
          since: HEAD~1
          mode: diff
